version: 2

models:
  - name: stg_movies
    description: "Cleaned and casted view of the raw movie catalog layout."
    columns:
      - name: movie_id
        description: "The unique primary key identifying the movie record."
        tests:
          - unique
          - not_null

  - name: stg_ratings
    description: "Normalized transaction view handling granular user streaming reviews."
    columns:
      - name: rating
        description: "The numeric score given by the user on a scale of 0.5 to 5.0."
        tests:
          - not_null
          - accepted_values:
              values: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]

  - name: stg_tags
    description: "Standardized text logs string-cleansed of case fragmentation."
    columns:
      - name: tag
        description: "The normalized user-submitted keyword metadata attribute."
        tests:
          - not_null

  - name: stg_links
    description: "Deduplicated indexing mapping layer utilizing optimized partition sorting rules."
    columns:
      - name: movie_id
        description: "The unique primary key map indicator."
        tests:
          - unique
          - not_null

  - name: stg_genome_tags
    description: "Cleaned staging view mapping unique tag IDs to system genome descriptions."
    columns:
      - name: tag_id
        description: "The unique primary key identifier for the genome tag entry."
        tests:
          - unique
          - not_null
      - name: tag
        description: "The text description of the structured tag element."
        tests:
          - not_null

  - name: stg_genome_scores
    description: "Staging view mapping the calculated structural relevance coefficients of movie-tag pairs."
    columns:
      - name: movie_id
        description: "Part of the composite key identifying the target content item."
        tests:
          - not_null
      - name: tag_id
        description: "Part of the composite key identifying the target system genome tag."
        tests:
          - not_null
      - name: relevance
        description: "The numeric index score indicating how accurately a tag describes the movie (bounded between 0.0 and 1.0)."
        tests:
          - not_null